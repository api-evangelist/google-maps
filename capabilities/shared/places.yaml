naftiko: "1.0.0-alpha1"

info:
  label: "Google Maps Places (New)"
  description: "The Places API (New) provides endpoints for text search, nearby search, place details, autocomplete, and place photos with comprehensive place data."
  tags:
    - Google Maps
    - Places
    - Search
    - POI
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      GOOGLE_MAPS_API_KEY: GOOGLE_MAPS_API_KEY

capability:
  consumes:
    - type: http
      namespace: google-maps-places
      baseUri: https://places.googleapis.com/v1
      description: "Google Maps Places API (New) for searching and retrieving place information."
      authentication:
        type: apikey
        key: X-Goog-Api-Key
        value: "{{GOOGLE_MAPS_API_KEY}}"
        placement: header
      resources:
        - name: place-details
          path: /places
          description: "Get detailed information about a specific place"
          operations:
            - name: get-place-details
              method: GET
              path: /{placeId}
              description: "Returns detailed information about a place identified by its resource name."
              inputParameters:
                - name: placeId
                  in: path
                  type: string
                  required: true
                  description: "The resource name of a place"
                - name: X-Goog-FieldMask
                  in: header
                  type: string
                  required: true
                  description: "Comma-separated list of fields to return"
                - name: languageCode
                  in: query
                  type: string
                  required: false
                  description: "BCP-47 language code for results"
                - name: regionCode
                  in: query
                  type: string
                  required: false
                  description: "Region code for biasing"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: text-search
          path: /places:searchText
          description: "Search for places using a text query"
          operations:
            - name: search-places-text
              method: POST
              description: "Returns places matching a text query like 'pizza in New York'."
              inputParameters:
                - name: X-Goog-FieldMask
                  in: header
                  type: string
                  required: true
                  description: "Comma-separated list of fields to return"
              body:
                type: json
                data:
                  textQuery: "{{tools.textQuery}}"
                  includedType: "{{tools.includedType}}"
                  languageCode: "{{tools.languageCode}}"
                  maxResultCount: "{{tools.maxResultCount}}"
                  openNow: "{{tools.openNow}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: nearby-search
          path: /places:searchNearby
          description: "Search for places near a specific location"
          operations:
            - name: search-places-nearby
              method: POST
              description: "Returns places near a specified location with type and ranking filters."
              inputParameters:
                - name: X-Goog-FieldMask
                  in: header
                  type: string
                  required: true
                  description: "Comma-separated list of fields to return"
              body:
                type: json
                data:
                  includedTypes: "{{tools.includedTypes}}"
                  maxResultCount: "{{tools.maxResultCount}}"
                  locationRestriction: "{{tools.locationRestriction}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: autocomplete
          path: /places:autocomplete
          description: "Get place predictions based on text input"
          operations:
            - name: autocomplete-places
              method: POST
              description: "Returns place and query predictions for input text."
              body:
                type: json
                data:
                  input: "{{tools.input}}"
                  languageCode: "{{tools.languageCode}}"
                  includeQueryPredictions: "{{tools.includeQueryPredictions}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: photos
          path: /places/{placeId}/photos
          description: "Access photos associated with places"
          operations:
            - name: get-place-photo
              method: GET
              path: /{photoReference}/media
              description: "Returns a photo for a place."
              inputParameters:
                - name: placeId
                  in: path
                  type: string
                  required: true
                  description: "The place ID"
                - name: photoReference
                  in: path
                  type: string
                  required: true
                  description: "The photo resource reference"
                - name: maxHeightPx
                  in: query
                  type: integer
                  required: false
                  description: "Maximum height in pixels (1-4800)"
                - name: maxWidthPx
                  in: query
                  type: integer
                  required: false
                  description: "Maximum width in pixels (1-4800)"
                - name: skipHttpRedirect
                  in: query
                  type: boolean
                  required: false
                  description: "Return JSON with URI instead of redirect"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: google-maps-places-rest
      resources:
        - path: /v1/places/{placeId}
          name: place-details
          description: "Place details"
          operations:
            - method: GET
              name: get-place-details
              description: "Get detailed information about a place"
              call: "google-maps-places.get-place-details"
              with:
                placeId: "rest.placeId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/places/search-text
          name: text-search
          description: "Text search for places"
          operations:
            - method: POST
              name: search-places-text
              description: "Search for places using a text query"
              call: "google-maps-places.search-places-text"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/places/search-nearby
          name: nearby-search
          description: "Nearby search for places"
          operations:
            - method: POST
              name: search-places-nearby
              description: "Search for places near a location"
              call: "google-maps-places.search-places-nearby"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/places/autocomplete
          name: autocomplete
          description: "Place autocomplete"
          operations:
            - method: POST
              name: autocomplete-places
              description: "Get place predictions for input text"
              call: "google-maps-places.autocomplete-places"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: google-maps-places-mcp
      transport: http
      tools:
        - name: get-place-details
          description: "Get detailed information about a place by ID"
          hints:
            readOnly: true
            openWorld: true
          call: "google-maps-places.get-place-details"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-places-text
          description: "Search for places using a text query like 'pizza in New York'"
          hints:
            readOnly: true
            openWorld: true
          call: "google-maps-places.search-places-text"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-places-nearby
          description: "Search for places near a specific location"
          hints:
            readOnly: true
            openWorld: true
          call: "google-maps-places.search-places-nearby"
          outputParameters:
            - type: object
              mapping: "$."
        - name: autocomplete-places
          description: "Get place autocomplete predictions for input text"
          hints:
            readOnly: true
            openWorld: true
          call: "google-maps-places.autocomplete-places"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-place-photo
          description: "Get a photo for a place"
          hints:
            readOnly: true
            openWorld: true
          call: "google-maps-places.get-place-photo"
          outputParameters:
            - type: object
              mapping: "$."
